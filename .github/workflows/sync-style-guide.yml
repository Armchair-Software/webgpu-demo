name: Sync style guide to target repositories

# Triggered manually or automatically whenever style-guide.md is updated on master.
# Requires a repository secret SYNC_TOKEN containing a PAT with:
#   - Contents: write  (to push a new branch in each target repo)
#   - Pull requests: write  (to open PRs in each target repo)
# for all five target repositories.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: check repos but do not create branches or PRs'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - master
    paths:
      - 'style-guide.md'

env:
  STYLE_GUIDE_FILE: style-guide.md
  PR_TITLE: Add style guide
  BRANCH_NAME: add-style-guide
  SOURCE_REPO: Armchair-Software/webgpu-demo

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target_repo:
          - Armchair-Software/emscripten-clipboard-demo
          - Armchair-Software/webgpu-demo2
          - Armchair-Software/emscripten-sound-demo
          - Armchair-Software/chatgpt-emscripten-demo
          - Armchair-Software/boids-webgpu-demo

    steps:
      - name: Check out webgpu-demo (canonical source of style guide)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Check whether style guide already exists in target repo
        id: check
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          REPO="${{ matrix.target_repo }}"
          if gh api "/repos/${REPO}/contents/${STYLE_GUIDE_FILE}" > /dev/null 2>&1; then
            echo "Style guide already exists in ${REPO} — no action needed."
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
          else
            echo "Style guide not found in ${REPO} — will create PR."
            echo "needs_pr=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and open PR in target repo
        if: steps.check.outputs.needs_pr == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          REPO="${{ matrix.target_repo }}"
          BRANCH="${BRANCH_NAME}"

          # Encode the style-guide content in base64 for the Contents API
          CONTENT_B64=$(base64 -w 0 "source/${STYLE_GUIDE_FILE}")

          # Resolve the default branch and its HEAD SHA
          DEFAULT_BRANCH=$(gh api "/repos/${REPO}" --jq '.default_branch')
          BASE_SHA=$(gh api "/repos/${REPO}/git/ref/heads/${DEFAULT_BRANCH}" \
            --jq '.object.sha')

          echo "Target: ${REPO}  default branch: ${DEFAULT_BRANCH}  base SHA: ${BASE_SHA}"

          # Create the sync branch, or reset it to master HEAD if it already exists.
          # Resetting to master HEAD ensures the style-guide file is not yet present
          # on the branch, so the Contents API PUT below can create it fresh.
          if gh api "/repos/${REPO}/git/ref/heads/${BRANCH}" > /dev/null 2>&1; then
            gh api --method PATCH "/repos/${REPO}/git/refs/heads/${BRANCH}" \
              -f sha="${BASE_SHA}" \
              -F force=true > /dev/null
            echo "Reset existing branch '${BRANCH}' to ${DEFAULT_BRANCH} HEAD in ${REPO}."
          else
            gh api --method POST "/repos/${REPO}/git/refs" \
              -f ref="refs/heads/${BRANCH}" \
              -f sha="${BASE_SHA}" > /dev/null
            echo "Created branch '${BRANCH}' in ${REPO}."
          fi

          # Commit the style-guide file to the sync branch (always a new file since
          # the branch was just reset/created to match master, which has no style-guide.md)
          gh api --method PUT "/repos/${REPO}/contents/${STYLE_GUIDE_FILE}" \
            -f message="Add style guide (synced from ${SOURCE_REPO})" \
            -f content="${CONTENT_B64}" \
            -f branch="${BRANCH}" > /dev/null

          echo "Committed ${STYLE_GUIDE_FILE} to '${BRANCH}' in ${REPO}."

          # Open a PR (idempotent: skip if one is already open for this branch)
          EXISTING_PR=$(gh pr list \
            --repo "${REPO}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already open in ${REPO} — skipping."
          else
            PR_BODY=$(printf '%s\n\n%s' \
              "This PR adds the canonical Armchair Software style guide, synced verbatim from [${SOURCE_REPO}](https://github.com/${SOURCE_REPO}/blob/master/${STYLE_GUIDE_FILE})." \
              "No code changes are included — this is a documentation-only addition.")

            gh pr create \
              --repo "${REPO}" \
              --head "${BRANCH}" \
              --base "${DEFAULT_BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}"
            echo "Opened PR in ${REPO}."
          fi

      - name: Dry-run summary
        if: inputs.dry_run == true
        run: |
          REPO="${{ matrix.target_repo }}"
          if [ "${{ steps.check.outputs.needs_pr }}" = "true" ]; then
            echo "DRY RUN: Would open a PR in ${REPO}."
          else
            echo "DRY RUN: ${REPO} already has the style guide — no action needed."
          fi
